<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Renderer</title>
  <style>
    @font-face {
      font-family: 'GillSansExact';
      src: url('./GillSansExact.otf') format('opentype');
      font-weight: 400 700;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: 'BRLight';
      src: url('./BRLight.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --red: #e11d48;
      --yellow: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .controls {
      padding: 20px;
      align-self: start;
      position: sticky;
      top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .field input,
    .field select,
    .field button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font: inherit;
      background: #fff;
    }

    .field button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .field button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.4;
      margin-top: -4px;
    }

    .preview-wrap {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .preview-stage {
      min-height: 560px;
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
    }

    .sign-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
      width: 100%;
    }

    .combined-sign {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      line-height: 0;
    }

    .sign-slot {
      display: block;
      line-height: 0;
    }

    .sign-slot svg {
      display: block;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 420px;
      padding: 40px 20px;
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel controls">
      <div class="field">
        <label for="signFamily">Sign type</label>
        <select id="signFamily">
          <option value="standard">PS / EPS</option>
          <option value="wi">PSWI / EPSWI</option>
        </select>
      </div>

      <div class="field">
        <label for="direction">Direction arrow</label>
        <select id="direction">
          <option value="none">None</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="both">Both</option>
        </select>
        <div class="hint">Applied only to PS or PSWI boards. EPS and EPSWI boards are always rendered without direction arrows.</div>
      </div>

      <div class="field">
        <label for="psValue">PS speed</label>
        <input id="psValue" type="number" min="0" step="1" placeholder="e.g. 60" />
        <div class="hint">Leave blank to omit the PS or PSWI sign.</div>
      </div>

      <div class="field">
        <label for="epsValue">EPS speed</label>
        <input id="epsValue" type="number" min="0" step="1" placeholder="e.g. 75" />
        <div class="hint">Leave blank to omit the EPS or EPSWI sign.</div>
      </div>

      <div class="field">
        <button id="copyPngBtn" type="button">Copy preview as PNG</button>
      </div>

      <div class="field">
        <button id="downloadPngBtn" class="secondary" type="button">Download PNG</button>
      </div>

      <div class="hint" id="message">Ready.</div>
    </section>

    <section class="panel preview-wrap">
      <div class="toolbar">
        <div class="status" id="statusText">No signs currently selected.</div>
      </div>
      <div class="preview-stage">
        <div id="preview" class="sign-stack"></div>
      </div>
    </section>
  </div>

  <script src="./rg-signs.js"></script>

  <script>
    const els = {
      signFamily: document.getElementById('signFamily'),
      direction: document.getElementById('direction'),
      psValue: document.getElementById('psValue'),
      epsValue: document.getElementById('epsValue'),
      preview: document.getElementById('preview'),
      statusText: document.getElementById('statusText'),
      message: document.getElementById('message'),
      copyPngBtn: document.getElementById('copyPngBtn'),
      downloadPngBtn: document.getElementById('downloadPngBtn')
    };

    const state = {
      family: 'standard',
      direction: 'none',
      ps: '',
      eps: ''
    };

    let renderToken = 0;

    function rendererAvailable() {
      return typeof window.ensureSignRenderersReady === 'function'
        && typeof window.renderPS === 'function'
        && typeof window.renderEPS === 'function'
        && typeof window.renderPSWI === 'function'
        && typeof window.renderEPSWI === 'function';
    }

    async function ensureAppFontsReady() {
      if (!document.fonts || !document.fonts.load) return;

      await Promise.allSettled([
        document.fonts.load('400 200px BRLight'),
        document.fonts.load('400 400px GillSansExact'),
        document.fonts.load('700 400px GillSansExact')
      ]);

      try {
        await document.fonts.ready;
      } catch (error) {
        console.warn('document.fonts.ready failed', error);
      }
    }

    function cleanSpeed(value) {
      if (value === '' || value == null) return '';
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return '';
      return String(Math.round(n));
    }

    function getBoards() {
      const boards = [];
      const ps = cleanSpeed(state.ps);
      const eps = cleanSpeed(state.eps);

      if (state.family === 'standard') {
        if (ps) boards.push({ key: 'PS', render: (node) => window.renderPS(node, ps, 0.22, state.direction, 'red') });
        if (eps) boards.push({ key: 'EPS', render: (node) => window.renderEPS(node, eps, 0.22) });
      } else {
        if (ps) boards.push({ key: 'PSWI', render: (node) => window.renderPSWI(node, ps, 0.22, state.direction) });
        if (eps) boards.push({ key: 'EPSWI', render: (node) => window.renderEPSWI(node, eps, 0.22) });
      }

      return boards;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitForRendererPaint() {
      await wait(50);
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function getVerticalGapBetweenRects(upperRect, lowerRect) {
      return Math.max(0, lowerRect.top - upperRect.bottom);
    }

    function measureInternalSlotGap(slot) {
      if (!slot) return 0;

      const svgs = Array.from(slot.querySelectorAll('svg'));
      if (svgs.length < 2) return 0;

      const rects = svgs
        .map(svg => svg.getBoundingClientRect())
        .sort((a, b) => a.top - b.top);

      let maxGap = 0;
      for (let i = 0; i < rects.length - 1; i++) {
        maxGap = Math.max(maxGap, getVerticalGapBetweenRects(rects[i], rects[i + 1]));
      }

      return Math.round(maxGap);
    }

    function getReferenceStackGap(slots) {
      for (const slot of slots) {
        const gap = measureInternalSlotGap(slot);
        if (gap > 0) return gap;
      }
      return 0;
    }

    function applyPreviewStackGap(gapPx) {
      const combined = els.preview.querySelector('.combined-sign');
      if (!combined) return;
      combined.style.gap = `${gapPx}px`;
    }

    async function renderPreview() {
      const token = ++renderToken;

      state.family = els.signFamily.value;
      state.direction = els.direction.value;
      state.ps = els.psValue.value;
      state.eps = els.epsValue.value;

      els.preview.innerHTML = '';

      if (!rendererAvailable()) {
        if (token !== renderToken) return;
        els.statusText.textContent = 'Renderer not loaded.';
        els.preview.innerHTML = '<div class="empty">Load <code>rg-signs.js</code> before this page script so the preview can render.</div>';
        return;
      }

      await ensureAppFontsReady();
      if (token !== renderToken) return;

      await window.ensureSignRenderersReady();
      if (token !== renderToken) return;

      await waitForRendererPaint();
      if (token !== renderToken) return;

      const boards = getBoards();

      if (!boards.length) {
        if (token !== renderToken) return;
        els.statusText.textContent = 'No signs currently selected.';
        els.preview.innerHTML = '<div class="empty">Enter a PS and/or EPS speed to generate a preview.</div>';
        return;
      }

      els.preview.innerHTML = '';
      els.statusText.textContent = `${boards.length} sign${boards.length === 1 ? '' : 's'} in preview.`;

      const combined = document.createElement('div');
      combined.className = 'combined-sign';
      els.preview.appendChild(combined);

      for (const board of boards) {
        if (token !== renderToken) return;
        const slot = document.createElement('div');
        slot.className = 'sign-slot';
        slot.dataset.key = board.key;
        combined.appendChild(slot);
        board.render(slot);
      }

      await waitForRendererPaint();
      if (token !== renderToken) return;

      const slots = Array.from(combined.querySelectorAll(':scope > .sign-slot'));
      const stackGap = getReferenceStackGap(slots);
      applyPreviewStackGap(stackGap);

      await waitForRendererPaint();
    }

    async function collectRenderedSlots() {
      await waitForRendererPaint();

      const combined = els.preview.querySelector('.combined-sign');
      if (!combined) return [];

      return Array.from(combined.querySelectorAll(':scope > .sign-slot'));
    }

    function getCssVarValue(name, fallback) {
      const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return value || fallback;
    }

    async function blobToDataUrl(blob) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Could not read font file.'));
        reader.readAsDataURL(blob);
      });
    }

    async function buildEmbeddedFontCss() {
      const [gillBlob, brBlob] = await Promise.all([
        fetch(new URL('./GillSansExact.otf', document.baseURI)).then(r => {
          if (!r.ok) throw new Error('Could not load GillSansExact.otf for export.');
          return r.blob();
        }),
        fetch(new URL('./BRLight.ttf', document.baseURI)).then(r => {
          if (!r.ok) throw new Error('Could not load BRLight.ttf for export.');
          return r.blob();
        })
      ]);

      const [gillDataUrl, brDataUrl] = await Promise.all([
        blobToDataUrl(gillBlob),
        blobToDataUrl(brBlob)
      ]);

      return `
        @font-face {
          font-family: 'GillSansExact';
          src: url('${gillDataUrl}') format('opentype');
          font-weight: 400 700;
          font-style: normal;
        }
        @font-face {
          font-family: 'BRLight';
          src: url('${brDataUrl}') format('truetype');
          font-weight: 400;
          font-style: normal;
        }
        :root {
          --red: ${getCssVarValue('--red', '#e11d48')};
          --yellow: ${getCssVarValue('--yellow', '#facc15')};
        }
      `;
    }

    function cloneSlotForExport(slot, embeddedFontCss) {
      const svgNS = 'http://www.w3.org/2000/svg';
      const slotRect = slot.getBoundingClientRect();
      const childSvgs = Array.from(slot.querySelectorAll('svg'));

      if (!childSvgs.length || !slotRect.width || !slotRect.height) {
        throw new Error('Could not export sign slot.');
      }

      const exportSvg = document.createElementNS(svgNS, 'svg');
      exportSvg.setAttribute('xmlns', svgNS);
      exportSvg.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      exportSvg.setAttribute('viewBox', `0 0 ${slotRect.width} ${slotRect.height}`);
      exportSvg.setAttribute('width', slotRect.width);
      exportSvg.setAttribute('height', slotRect.height);

      const defsHost = document.getElementById('defs-host');
      if (defsHost && defsHost.innerHTML.trim()) {
        const defs = document.createElementNS(svgNS, 'defs');
        defs.innerHTML = defsHost.innerHTML;
        exportSvg.appendChild(defs);
      }

      const style = document.createElementNS(svgNS, 'style');
      style.textContent = embeddedFontCss;
      exportSvg.appendChild(style);

      for (const originalSvg of childSvgs) {
        const rect = originalSvg.getBoundingClientRect();
        const x = rect.left - slotRect.left;
        const y = rect.top - slotRect.top;

        const wrapper = document.createElementNS(svgNS, 'g');
        wrapper.setAttribute('transform', `translate(${x}, ${y})`);

        const clone = originalSvg.cloneNode(true);
        clone.setAttribute('x', '0');
        clone.setAttribute('y', '0');
        clone.setAttribute('width', rect.width);
        clone.setAttribute('height', rect.height);

        if (!clone.getAttribute('viewBox')) {
          clone.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
        }

        wrapper.appendChild(clone);
        exportSvg.appendChild(wrapper);
      }

      return {
        svg: exportSvg,
        width: slotRect.width,
        height: slotRect.height
      };
    }

    async function buildCompositePngBlob() {
      await ensureAppFontsReady();
      await waitForRendererPaint();

      const slots = await collectRenderedSlots();

      if (!slots.length) {
        throw new Error('There is nothing to export.');
      }

      const embeddedFontCss = await buildEmbeddedFontCss();

      const CANVAS_WIDTH = 68.75;
      const SIDE_PADDING = 2;
      const INNER_WIDTH = CANVAS_WIDTH - SIDE_PADDING * 2;

      function svgToBlob(svgElement) {
        const svgText = new XMLSerializer().serializeToString(svgElement);
        return new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      }

      async function loadImageFromBlob(blob) {
        const url = URL.createObjectURL(blob);

        try {
          return await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('SVG could not be rasterized.'));
            img.src = url;
          });
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      const referenceGapPx = getReferenceStackGap(slots);
      let referenceScale = 1;

      const renderedItems = [];

      for (let index = 0; index < slots.length; index++) {
        const slot = slots[index];
        const item = cloneSlotForExport(slot, embeddedFontCss);
        const blob = svgToBlob(item.svg);
        const img = await loadImageFromBlob(blob);

        const naturalWidth = img.naturalWidth || item.width;
        const naturalHeight = img.naturalHeight || item.height;

        if (!naturalWidth || !naturalHeight) {
          throw new Error('Invalid exported sign size.');
        }

        const scale = INNER_WIDTH / naturalWidth;
        const drawWidth = Math.max(1, Math.round(naturalWidth * scale));
        const drawHeight = Math.max(1, Math.round(naturalHeight * scale));

        if (referenceGapPx > 0 && measureInternalSlotGap(slot) > 0 && referenceScale === 1) {
          referenceScale = scale;
        }

        renderedItems.push({
          img,
          drawWidth,
          drawHeight
        });
      }

      const exportGap = referenceGapPx > 0
        ? Math.max(1, Math.round(referenceGapPx * referenceScale))
        : 0;

      const totalHeight =
        renderedItems.reduce((sum, item) => sum + item.drawHeight, 0) +
        exportGap * Math.max(0, renderedItems.length - 1);

      const canvas = document.createElement('canvas');
      canvas.width = CANVAS_WIDTH;
      canvas.height = totalHeight;

      const ctx = canvas.getContext('2d', { alpha: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      let y = 0;
      for (let i = 0; i < renderedItems.length; i++) {
        const item = renderedItems[i];
        const x = Math.round((CANVAS_WIDTH - item.drawWidth) / 2);

        ctx.drawImage(item.img, x, y, item.drawWidth, item.drawHeight);
        y += item.drawHeight;

        if (i < renderedItems.length - 1) {
          y += exportGap;
        }
      }

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('PNG export failed.'));
        }, 'image/png');
      });
    }

    async function copyPreviewAsPng() {
      try {
        const blob = await buildCompositePngBlob();
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        els.message.textContent = 'PNG copied to clipboard.';
      } catch (error) {
        console.error(error);
        els.message.textContent = `Copy failed: ${error.message}`;
      }
    }

    async function downloadPreviewAsPng() {
      try {
        const blob = await buildCompositePngBlob();

        const handle = await window.showSaveFilePicker({
          types: [
            {
              description: 'PNG image',
              accept: {
                'image/png': ['.png']
              }
            }
          ]
        });

        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();

        els.message.textContent = 'PNG saved.';
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('Failed to save PNG.');
        }
      }
    }

    els.signFamily.addEventListener('change', renderPreview);
    els.direction.addEventListener('change', renderPreview);
    els.psValue.addEventListener('input', renderPreview);
    els.epsValue.addEventListener('input', renderPreview);

    els.copyPngBtn.addEventListener('click', copyPreviewAsPng);
    els.downloadPngBtn.addEventListener('click', downloadPreviewAsPng);

    renderPreview();
  </script>
</body>
</html>
