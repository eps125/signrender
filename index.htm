    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --red: #e11d48;
      --yellow: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      border-radius: 16px;
      background: #e5e7eb;
      width: fit-content;
    }

    .tab-btn {
      border: 0;
      border-radius: 12px;
      background: transparent;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .app {
      min-height: calc(100vh - 120px);
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .controls {
      padding: 20px;
      align-self: start;
      position: sticky;
      top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .field input,
    .field select,
    .field button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font: inherit;
      background: #fff;
    }

    .field button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .field button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .radio-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .radio-option input {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.4;
      margin-top: -4px;
    }

    .control-group[hidden] {
      display: none !important;
    }

    .preview-wrap {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .preview-stage {
      min-height: 560px;
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
    }

    .sign-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
      width: 100%;
    }

    .combined-sign {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      line-height: 0;
    }

    .combined-sign.horizontal {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
    }

    .sign-slot,
    .signal-slot {
      display: block;
      line-height: 0;
    }

    .sign-slot svg,
    .signal-slot svg {
      display: block;
    }

    .signal-slot {
      width: min(100%, 360px);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 420px;
      padding: 40px 20px;
    }

    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .field-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="tabs" role="tablist" aria-label="Renderer mode">
      <button id="tabSigns" class="tab-btn active" type="button" role="tab" aria-selected="true">Signs</button>
      <button id="tabSignals" class="tab-btn" type="button" role="tab" aria-selected="false">Signals</button>
      <button id="tabCsm" class="tab-btn" type="button" role="tab" aria-selected="false">CSM</button>
    </div>

    <div class="app">
      <section class="panel controls">
        <div id="signControls" class="control-group">
          <div class="field">
            <label for="signFamily">Sign type</label>
            <select id="signFamily">
              <option value="standard">PS / EPS</option>
              <option value="wi">PSWI / EPSWI</option>
            </select>
          </div>

          <div class="field">
            <label for="direction">Direction arrow</label>
            <select id="direction">
              <option value="none">None</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
              <option value="both">Both</option>
            </select>
            <div class="hint">Applied only to PS or PSWI boards. EPS and EPSWI boards are always rendered without direction arrows.</div>
          </div>

          <div class="field">
            <label for="psValue">PS speed</label>
            <input id="psValue" type="number" min="0" step="1" placeholder="e.g. 60" />
            <div class="hint">Leave blank to omit the PS or PSWI sign.</div>
          </div>

          <div class="field">
            <label for="muValue">MU speed</label>
            <input id="muValue" type="number" min="0" step="1" placeholder="e.g. 90" />
            <div class="hint">Leave blank to omit the MU sign.</div>
          </div>

          <div class="field">
            <label for="epsValue">EPS speed</label>
            <input id="epsValue" type="number" min="0" step="1" placeholder="e.g. 75" />

              <option value="None">None</option>

              <option value="YY">YY</option>
              <option value="FY">FY</option>
              <option value="FYY">FYY</option>
              <option value="G">G</option>
            </select>

          <div class="field-row">
            <div class="field"><label for="ji1">JI 1</label><select id="ji1"></select></div>
            <div class="field"><label for="ji2">JI 2</label><select id="ji2"></select></div>

          <div class="field-row">

          </div>
          <div class="field-row">
            <div class="field"><label for="ji5">JI 5</label><select id="ji5"></select></div>
            <div class="field"><label for="ji6">JI 6</label><select id="ji6"></select></div>

          <div class="field-row">
            <div class="field">
              <label for="bottomTheatreLeft">Bottom Theatre Left</label>
              <input id="bottomTheatreLeft" type="text" maxlength="1" placeholder="Single character" />
            </div>
            <div class="field">

              <input id="bottomTheatreRight" type="text" maxlength="1" placeholder="Single character" />

            <select id="theatreColour">
              <option value="White">White</option>
              <option value="Green">Green</option>

          <button id="copyPngBtn" type="button">Copy preview as PNG</button>
        </div>

          <button id="downloadPngBtn" class="secondary" type="button">Download PNG</button>
        </div>

      </section>

      <section class="panel preview-wrap">
        <div class="toolbar">
          <!--<div class="status" id="statusText">No signs currently selected.</div>-->
        </div>
        <div class="preview-stage">
          <div id="preview" class="sign-stack"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="./renderer-120326.js"></script>

  <script>
    const signalColourOptions = ['None', 'Blank', 'White', 'Green', 'Yellow', 'Red'];

    function populateJiSelect(select) {
      for (const option of signalColourOptions) {
        const el = document.createElement('option');
        el.value = option;
        el.textContent = option;
        select.appendChild(el);
      }
    }

    ['ji1', 'ji2', 'ji3', 'ji4', 'ji5', 'ji6'].forEach(id => populateJiSelect(document.getElementById(id)));

    const els = {
      tabSigns: document.getElementById('tabSigns'),
      tabSignals: document.getElementById('tabSignals'),
      tabCsm: document.getElementById('tabCsm'),
      signControls: document.getElementById('signControls'),
      signalControls: document.getElementById('signalControls'),
      csmControls: document.getElementById('csmControls'),
      signFamily: document.getElementById('signFamily'),
      direction: document.getElementById('direction'),
      psValue: document.getElementById('psValue'),
      muValue: document.getElementById('muValue'),
      epsValue: document.getElementById('epsValue'),
      stackingVertical: document.getElementById('stackingVertical'),
      stackingHorizontal: document.getElementById('stackingHorizontal'),
      signalType: document.getElementById('signalType'),
      aspectDisplayed: document.getElementById('aspectDisplayed'),
      ji1: document.getElementById('ji1'),
      ji2: document.getElementById('ji2'),
      ji3: document.getElementById('ji3'),
      ji4: document.getElementById('ji4'),
      ji5: document.getElementById('ji5'),
      ji6: document.getElementById('ji6'),
      bottomTheatreLeft: document.getElementById('bottomTheatreLeft'),
      bottomTheatreRight: document.getElementById('bottomTheatreRight'),
      theatreColour: document.getElementById('theatreColour'),
      signalId: document.getElementById('signalId'),
      csmValue: document.getElementById('csmValue'),
      csmTraction: document.getElementById('csmTraction'),
      preview: document.getElementById('preview'),
      statusText: document.getElementById('statusText'),
      message: document.getElementById('message'),
      copyPngBtn: document.getElementById('copyPngBtn'),
      downloadPngBtn: document.getElementById('downloadPngBtn')
    };

    const state = {
      mode: 'signs',
      family: 'standard',
      direction: 'none',
      ps: '',
      mu: '',
      eps: '',
      signStacking: 'vertical',
      signalType: '4aspect',
      aspectDisplayed: 'None',
      ji: ['None', 'None', 'None', 'None', 'None', 'None'],
      bottomTheatreLeft: '',
      bottomTheatreRight: '',
      theatreColor: 'White',
      signalId: '',
      csmValue: '',
      csmTraction: []
    };

    let renderToken = 0;

    function rendererAvailable() {
      return typeof window.ensureSignRenderersReady === 'function'
        && typeof window.renderPS === 'function'
        && typeof window.renderMU === 'function'
        && typeof window.renderEPS === 'function'
        && typeof window.renderPSWI === 'function'
        && typeof window.renderEPSWI === 'function'
        && typeof window.renderSignal === 'function'
        && typeof window.renderCSM === 'function'
        && typeof window.normalizeSignalConfig === 'function';
    }

    async function ensureAppFontsReady() {
      if (!document.fonts || !document.fonts.load) return;

      await Promise.allSettled([
        document.fonts.load('400 200px BRLight'),
        document.fonts.load('400 400px GillSansExact'),
        document.fonts.load('700 400px GillSansExact'),
        document.fonts.load('400 48px "LEDDotMatrix"')
      ]);

      try {
        await document.fonts.ready;
      } catch (error) {
        console.warn('document.fonts.ready failed', error);
      }
    }

    function cleanSpeed(value) {
      if (value === '' || value == null) return '';
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return '';
      return String(Math.round(n));
    }

    function normalizeSignalIdInput(value) {
      return (value || '').toUpperCase().replace(/\s+/g, ' ').replace(/[^A-Z0-9 ]/g, '').trimStart().slice(0, 9);
    }


    function normalizeCsmValueInput(value) {
      let cleaned = (value || '')
        .toUpperCase()
        .replace(/[^A-Z0-9/\-\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();

      cleaned = cleaned.replace(/\s*([\-/])\s*/g, ' $1 ');
      cleaned = cleaned.replace(/\s+X$/g, 'X');
      return cleaned.slice(0, 16);
    }

    function parseTractionIdentifiers(value) {
      const parts = (value || '')
        .split(/[,\n\r;]+/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => part.replace(/\s+/g, ' ').slice(0, 24));

      return Array.from(new Set(parts)).sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
    }

    function normalizeCsmConfig() {
      const marker = normalizeCsmValueInput(els.csmValue.value);
      const canonical = marker.replace(/\s+/g, '');
      const match = canonical.match(/^(S|\d{1,2}X?|\d{1,2}[\-/]\d{1,2}X?)$/);
      const traction = parseTractionIdentifiers(els.csmTraction.value);
      state.csmValue = match ? canonical : '';
      state.csmTraction = traction;
      return {
        value: state.csmValue,
        traction
      };
    }

    function getBoards() {
      const boards = [];
      const ps = cleanSpeed(state.ps);
      const mu = cleanSpeed(state.mu);
      const eps = cleanSpeed(state.eps);

      if (state.family === 'standard') {
        if (ps) boards.push({ key: 'PS', render: (node) => window.renderPS(node, ps, 0.22, state.direction, 'red') });
        if (mu) boards.push({ key: 'MU', render: (node) => window.renderMU(node, mu, 0.22) });
        if (eps) boards.push({ key: 'EPS', render: (node) => window.renderEPS(node, eps, 0.22) });
      } else {
        if (ps) boards.push({ key: 'PSWI', render: (node) => window.renderPSWI(node, ps, 0.22, state.direction) });
        if (eps) boards.push({ key: 'EPSWI', render: (node) => window.renderEPSWI(node, eps, 0.22) });
      }

      return boards;
    }

    function syncSignStackingFromInputs() {
      state.signStacking = els.stackingHorizontal.checked ? 'horizontal' : 'vertical';
    }

    function applyCombinedSignLayout(combined, gapPx = 0) {
      if (!combined) return;
      const isHorizontal = state.signStacking === 'horizontal';
      combined.classList.toggle('horizontal', isHorizontal);
      combined.style.gap = `${Math.max(0, Math.round(gapPx))}px`;
    }

    function getNormalizedSignalConfig() {
      return window.normalizeSignalConfig({
        signalType: state.signalType,
        aspectDisplayed: state.aspectDisplayed,
        ji: state.ji,
        bottomTheatreLeft: state.bottomTheatreLeft,
        bottomTheatreRight: state.bottomTheatreRight,
        theatreColor: state.theatreColor,
        signalId: state.signalId,
        svgPath: './4aspectsignal.svg'
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitForRendererPaint() {
      await wait(50);
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function getVerticalGapBetweenRects(upperRect, lowerRect) {
      return Math.max(0, lowerRect.top - upperRect.bottom);
    }

    function measureInternalSlotGap(slot) {
      if (!slot) return 0;
      const svgs = Array.from(slot.querySelectorAll('svg'));
      if (svgs.length < 2) return 0;
      const rects = svgs.map(svg => svg.getBoundingClientRect()).sort((a, b) => a.top - b.top);
      let maxGap = 0;
      for (let i = 0; i < rects.length - 1; i++) {
        maxGap = Math.max(maxGap, getVerticalGapBetweenRects(rects[i], rects[i + 1]));
      }
      return Math.round(maxGap);
    }

    function getReferenceStackGap(slots) {
      for (const slot of slots) {
        const gap = measureInternalSlotGap(slot);
        if (gap > 0) return gap;
      }
      return 0;
    }

    function applyPreviewStackGap(gapPx) {
      const combined = els.preview.querySelector('.combined-sign');
      if (!combined) return;
      combined.style.gap = `${gapPx}px`;
    }

    function updateTabUi() {
      const isSigns = state.mode === 'signs';
      const isSignals = state.mode === 'signals';
      const isCsm = state.mode === 'csm';
      els.tabSigns.classList.toggle('active', isSigns);
      els.tabSignals.classList.toggle('active', isSignals);
      els.tabCsm.classList.toggle('active', isCsm);
      els.tabSigns.setAttribute('aria-selected', String(isSigns));
      els.tabSignals.setAttribute('aria-selected', String(isSignals));
      els.tabCsm.setAttribute('aria-selected', String(isCsm));
      els.signControls.hidden = !isSigns;
      els.signalControls.hidden = !isSignals;
      els.csmControls.hidden = !isCsm;
    }

    function syncSignalStateFromInputs() {
      state.signalType = els.signalType.value;
      state.aspectDisplayed = els.aspectDisplayed.value;
      state.ji = [els.ji1.value, els.ji2.value, els.ji3.value, els.ji4.value, els.ji5.value, els.ji6.value];
      state.bottomTheatreLeft = (els.bottomTheatreLeft.value || '').slice(0, 1).toUpperCase();
      state.bottomTheatreRight = (els.bottomTheatreRight.value || '').slice(0, 1).toUpperCase();
      state.theatreColor = els.theatreColour.value;
      state.signalId = normalizeSignalIdInput(els.signalId.value);

      const normalized = getNormalizedSignalConfig();
      state.ji = normalized.ji.slice();
      state.bottomTheatreLeft = normalized.bottomTheatreLeft;
      state.bottomTheatreRight = normalized.bottomTheatreRight;

      [els.ji1.value, els.ji2.value, els.ji3.value, els.ji4.value, els.ji5.value, els.ji6.value] = state.ji;
      els.bottomTheatreLeft.value = state.bottomTheatreLeft;
      els.bottomTheatreRight.value = state.bottomTheatreRight;

      els.ji2.disabled = state.ji[0] === 'None';
      els.ji3.disabled = state.ji[1] === 'None';
      els.ji5.disabled = state.ji[3] === 'None';
      els.ji6.disabled = state.ji[4] === 'None';
    }

    async function renderSignsPreview(token) {
      state.family = els.signFamily.value;
      state.direction = els.direction.value;
      state.ps = els.psValue.value;
      state.mu = els.muValue.value;
      state.eps = els.epsValue.value;
      syncSignStackingFromInputs();

      const boards = getBoards();
      if (!boards.length) {
        if (token !== renderToken) return;
        els.statusText.textContent = 'No signs currently selected.';
        els.preview.innerHTML = '<div class="empty">Enter a PS and/or EPS speed to generate a preview.</div>';
        return;
      }

      els.preview.innerHTML = '';
      els.statusText.textContent = `${boards.length} sign${boards.length === 1 ? '' : 's'} in preview · ${state.signStacking === 'horizontal' ? 'horizontal line' : 'vertical stack'}.`;

      const combined = document.createElement('div');
      combined.className = 'combined-sign';
      applyCombinedSignLayout(combined, 0);
      els.preview.appendChild(combined);

      for (const board of boards) {
        if (token !== renderToken) return;
        const slot = document.createElement('div');
        slot.className = 'sign-slot';
        slot.dataset.key = board.key;
        combined.appendChild(slot);
        board.render(slot);
      }

      await waitForRendererPaint();
      if (token !== renderToken) return;

      const slots = Array.from(combined.querySelectorAll(':scope > .sign-slot'));
      const stackGap = state.signStacking === 'vertical' ? getReferenceStackGap(slots) : 0;
      applyCombinedSignLayout(combined, stackGap);
      await waitForRendererPaint();
    }

    async function renderSignalPreview(token) {
      syncSignalStateFromInputs();
      const signalConfig = getNormalizedSignalConfig();

      els.preview.innerHTML = '';
      const slot = document.createElement('div');
      slot.className = 'signal-slot';
      slot.dataset.key = signalConfig.signalType;
      els.preview.appendChild(slot);

      await window.renderSignal(slot, signalConfig);
      if (token !== renderToken) return;

      const summary = [];
      summary.push(`${signalConfig.signalType === '4aspect' ? '4 Aspect' : signalConfig.signalType} signal`);
      summary.push(`aspect ${signalConfig.aspectDisplayed}`);
      const activeJiCount = signalConfig.ji.filter(value => value !== 'None').length;
      summary.push(`${activeJiCount} JI${activeJiCount === 1 ? '' : 's'} active`);
      els.statusText.textContent = summary.join(' · ');

      await waitForRendererPaint();
    }


    async function renderCsmPreview(token) {
      const csmConfig = normalizeCsmConfig();

      if (!csmConfig.value) {
        if (token !== renderToken) return;
        els.statusText.textContent = 'No CSM currently selected.';
        els.preview.innerHTML = '<div class="empty">Enter S, a car count, or a hyphenated range to generate a car stop marker.</div>';
        return;
      }

      els.preview.innerHTML = '';
      const slot = document.createElement('div');
      slot.className = 'sign-slot';
      slot.dataset.key = 'CSM';
      els.preview.appendChild(slot);

      await window.renderCSM(slot, csmConfig, 1);
      if (token !== renderToken) return;

      els.statusText.textContent = `${csmConfig.value}${csmConfig.traction.length ? ` · ${csmConfig.traction.length} traction class${csmConfig.traction.length === 1 ? '' : 'es'}` : ' · all train classes'}`;
      await waitForRendererPaint();
    }

    async function renderPreview() {
      const token = ++renderToken;
      updateTabUi();
      els.preview.innerHTML = '';

      if (!rendererAvailable()) {
        if (token !== renderToken) return;
        els.statusText.textContent = 'Renderer not loaded.';
        els.preview.innerHTML = '<div class="empty">Load the renderer script before this page script so the preview can render.</div>';
        return;
      }

      await ensureAppFontsReady();
      if (token !== renderToken) return;

      await window.ensureSignRenderersReady();
      if (token !== renderToken) return;

      await waitForRendererPaint();
      if (token !== renderToken) return;

      if (state.mode === 'signs') {
        await renderSignsPreview(token);
      } else if (state.mode === 'signals') {
        await renderSignalPreview(token);
      } else {
        await renderCsmPreview(token);
      }
    }

    async function collectRenderedSlots() {
      await waitForRendererPaint();
      const combined = els.preview.querySelector('.combined-sign');
      if (combined) return Array.from(combined.querySelectorAll(':scope > .sign-slot, :scope > .signal-slot'));
      return Array.from(els.preview.querySelectorAll(':scope > .sign-slot, :scope > .signal-slot'));
    }

    function getCssVarValue(name, fallback) {
      const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return value || fallback;
    }

    async function blobToDataUrl(blob) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Could not read font file.'));
        reader.readAsDataURL(blob);
      });
    }

    async function buildEmbeddedFontCss() {
      const [gillBlob, brBlob, ledBlob] = await Promise.all([
        fetch(new URL('./GillSansExact.otf', document.baseURI)).then(r => {
          if (!r.ok) throw new Error('Could not load GillSansExact.otf for export.');
          return r.blob();
        }),
        fetch(new URL('./BRLight.ttf', document.baseURI)).then(r => {
          if (!r.ok) throw new Error('Could not load BRLight.ttf for export.');
          return r.blob();
        }),
        fetch(new URL('./LEDDotMatrix.ttf', document.baseURI)).then(r => {
          if (!r.ok) throw new Error('Could not load LEDDotMatrix.ttf for export.');
          return r.blob();
        })
      ]);

      const [gillDataUrl, brDataUrl, ledDataUrl] = await Promise.all([
        blobToDataUrl(gillBlob),
        blobToDataUrl(brBlob),
        blobToDataUrl(ledBlob)
      ]);

      return `
        @font-face {
          font-family: 'GillSansExact';
          src: url('${gillDataUrl}') format('opentype');
          font-weight: 400 700;
          font-style: normal;
        }
        @font-face {
          font-family: 'BRLight';
          src: url('${brDataUrl}') format('truetype');
          font-weight: 400;
          font-style: normal;
        }
        @font-face {
          font-family: 'LEDDotMatrix';
          src: url('${ledDataUrl}') format('truetype');
          font-weight: 400;
          font-style: normal;
        }
        :root {
          --red: ${getCssVarValue('--red', '#e11d48')};
          --yellow: ${getCssVarValue('--yellow', '#facc15')};
        }
      `;
    }

    function cloneSlotForExport(slot, embeddedFontCss) {
      const svgNS = 'http://www.w3.org/2000/svg';
      const slotRect = slot.getBoundingClientRect();
      const childSvgs = Array.from(slot.querySelectorAll('svg'));

      if (!childSvgs.length || !slotRect.width || !slotRect.height) {
        throw new Error('Could not export preview slot.');
      }

      const exportSvg = document.createElementNS(svgNS, 'svg');
      exportSvg.setAttribute('xmlns', svgNS);
      exportSvg.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      exportSvg.setAttribute('viewBox', `0 0 ${slotRect.width} ${slotRect.height}`);
      exportSvg.setAttribute('width', slotRect.width);
      exportSvg.setAttribute('height', slotRect.height);

      const defsHost = document.getElementById('defs-host');
      if (defsHost && defsHost.innerHTML.trim()) {
        const defs = document.createElementNS(svgNS, 'defs');
        defs.innerHTML = defsHost.innerHTML;
        exportSvg.appendChild(defs);
      }

      const style = document.createElementNS(svgNS, 'style');
      style.textContent = embeddedFontCss;
      exportSvg.appendChild(style);

      for (const originalSvg of childSvgs) {
        const rect = originalSvg.getBoundingClientRect();
        const x = rect.left - slotRect.left;
        const y = rect.top - slotRect.top;

        const wrapper = document.createElementNS(svgNS, 'g');
        wrapper.setAttribute('transform', `translate(${x}, ${y})`);

        const clone = originalSvg.cloneNode(true);
        clone.setAttribute('x', '0');
        clone.setAttribute('y', '0');
        clone.setAttribute('width', rect.width);
        clone.setAttribute('height', rect.height);

        if (!clone.getAttribute('viewBox')) {
          clone.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
        }

        wrapper.appendChild(clone);
        exportSvg.appendChild(wrapper);
      }

      return {
        svg: exportSvg,
        width: slotRect.width,
        height: slotRect.height
      };
    }

    async function buildCompositePngBlob() {
      await ensureAppFontsReady();
      await waitForRendererPaint();

      const slots = await collectRenderedSlots();
      if (!slots.length) throw new Error('There is nothing to export.');

      const embeddedFontCss = await buildEmbeddedFontCss();

      function svgToBlob(svgElement) {
        const svgText = new XMLSerializer().serializeToString(svgElement);
        return new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      }

      async function loadImageFromBlob(blob) {
        const url = URL.createObjectURL(blob);
        try {
          return await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('SVG could not be rasterized.'));
            img.src = url;
          });
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      const referenceGapPx = getReferenceStackGap(slots);
      let referenceScale = 1;
      const renderedItems = [];
      const signExportMode = state.mode === 'signs';
      const horizontalSigns = signExportMode && state.signStacking === 'horizontal';
      const CANVAS_WIDTH = signExportMode && !horizontalSigns ? 55 : Math.max(120, Math.round(slots[0].getBoundingClientRect().width));
      const SIDE_PADDING = signExportMode && !horizontalSigns ? 2 : 0;
      const INNER_WIDTH = CANVAS_WIDTH - SIDE_PADDING * 2;

      for (let index = 0; index < slots.length; index++) {
        const slot = slots[index];
        const item = cloneSlotForExport(slot, embeddedFontCss);
        const blob = svgToBlob(item.svg);
        const img = await loadImageFromBlob(blob);

        const naturalWidth = img.naturalWidth || item.width;
        const naturalHeight = img.naturalHeight || item.height;
        if (!naturalWidth || !naturalHeight) throw new Error('Invalid exported preview size.');

        const scale = signExportMode ? (INNER_WIDTH / naturalWidth) : 1;
        const drawWidth = Math.max(1, Math.round(naturalWidth * scale));
        const drawHeight = Math.max(1, Math.round(naturalHeight * scale));

        if (referenceGapPx > 0 && measureInternalSlotGap(slot) > 0 && referenceScale === 1) {
          referenceScale = scale;
        }

        renderedItems.push({ img, drawWidth, drawHeight });
      }

      const exportGap = horizontalSigns
        ? 0
        : (referenceGapPx > 0 ? Math.max(1, Math.round(referenceGapPx * referenceScale)) : 0);

      const totalWidth = horizontalSigns
        ? renderedItems.reduce((sum, item) => sum + item.drawWidth, 0) + exportGap * Math.max(0, renderedItems.length - 1)
        : CANVAS_WIDTH;
      const totalHeight = horizontalSigns
        ? Math.max(...renderedItems.map(item => item.drawHeight))
        : renderedItems.reduce((sum, item) => sum + item.drawHeight, 0) + exportGap * Math.max(0, renderedItems.length - 1);

      const canvas = document.createElement('canvas');
      canvas.width = totalWidth;
      canvas.height = totalHeight;

      const ctx = canvas.getContext('2d', { alpha: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      if (horizontalSigns) {
        let x = 0;
        for (let i = 0; i < renderedItems.length; i++) {
          const item = renderedItems[i];
          ctx.drawImage(item.img, x, 0, item.drawWidth, item.drawHeight);
          x += item.drawWidth;
          if (i < renderedItems.length - 1) x += exportGap;
        }
      } else {
        let y = 0;
        for (let i = 0; i < renderedItems.length; i++) {
          const item = renderedItems[i];
          const x = Math.round((CANVAS_WIDTH - item.drawWidth) / 2);
          ctx.drawImage(item.img, x, y, item.drawWidth, item.drawHeight);
          y += item.drawHeight;
          if (i < renderedItems.length - 1) y += exportGap;
        }
      }

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('PNG export failed.'));
        }, 'image/png');
      });
    }

    async function copyPreviewAsPng() {
      try {
        const blob = await buildCompositePngBlob();
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        els.message.textContent = 'PNG copied to clipboard.';
      } catch (error) {
        console.error(error);
        els.message.textContent = `Copy failed: ${error.message}`;
      }
    }

    async function downloadPreviewAsPng() {
      try {
        const blob = await buildCompositePngBlob();
        const defaultName = state.mode === 'signs' ? 'sign-preview.png' : (state.mode === 'signals' ? 'signal-preview.png' : 'csm-preview.png');

        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: defaultName,
            types: [{ description: 'PNG image', accept: { 'image/png': ['.png'] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = defaultName;
          a.click();
          URL.revokeObjectURL(url);
        }

        els.message.textContent = 'PNG saved.';
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          els.message.textContent = `Save failed: ${err.message || 'Unknown error.'}`;
        }
      }
    }

    els.tabSigns.addEventListener('click', () => {
      state.mode = 'signs';
      renderPreview();
    });

    els.tabSignals.addEventListener('click', () => {
      state.mode = 'signals';
      renderPreview();
    });

    els.tabCsm.addEventListener('click', () => {
      state.mode = 'csm';
      renderPreview();
    });

    els.signFamily.addEventListener('change', renderPreview);
    els.direction.addEventListener('change', renderPreview);
    els.psValue.addEventListener('input', renderPreview);
    els.muValue.addEventListener('input', renderPreview);
    els.epsValue.addEventListener('input', renderPreview);
    els.stackingVertical.addEventListener('change', renderPreview);
    els.stackingHorizontal.addEventListener('change', renderPreview);

    [
      els.signalType,
      els.aspectDisplayed,
      els.ji1,
      els.ji2,
      els.ji3,
      els.ji4,
      els.ji5,
      els.ji6,
      els.theatreColour
    ].forEach(el => el.addEventListener('change', renderPreview));

    [els.bottomTheatreLeft, els.bottomTheatreRight].forEach(el => {
      el.addEventListener('input', () => {
        el.value = (el.value || '').replace(/\s+/g, '').slice(0, 1).toUpperCase();
        renderPreview();
      });
    });

    els.signalId.addEventListener('input', () => {
      els.signalId.value = normalizeSignalIdInput(els.signalId.value);
      renderPreview();
    });

    els.csmValue.addEventListener('input', () => {
      els.csmValue.value = normalizeCsmValueInput(els.csmValue.value);
      renderPreview();
    });

    els.csmTraction.addEventListener('input', renderPreview);

    els.copyPngBtn.addEventListener('click', copyPreviewAsPng);
    els.downloadPngBtn.addEventListener('click', downloadPreviewAsPng);

    syncSignalStateFromInputs();
    renderPreview();
  </script>
</body>
</html>
